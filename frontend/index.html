<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Go Competition</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Go Competition</h1>
          <p>9x9 area-scored Python player arena</p>
        </div>
        <button class="icon-button" id="refreshButton" type="button" title="Refresh">Refresh</button>
      </header>

      <nav class="tabs" aria-label="Views">
        <button class="tab active" data-tab="run" type="button">Run</button>
        <button class="tab" data-tab="history" type="button">History</button>
        <button class="tab" data-tab="replay" type="button">Replay</button>
        <button class="tab" data-tab="league" type="button">League</button>
      </nav>

      <div class="notice hidden" id="notice"></div>

      <section class="view" id="runView">
        <div class="layout-two">
          <form class="panel" id="matchForm">
            <h2>Run Match</h2>
            <label>
              Black player
              <select id="blackPlayer"></select>
            </label>
            <label>
              White player
              <select id="whitePlayer"></select>
            </label>
            <div class="field-row">
              <label>
                Games
                <input id="gameCount" type="number" min="1" max="100" value="2" />
              </label>
              <label>
                Komi
                <input id="komi" type="number" step="0.5" value="6.5" />
              </label>
              <label>
                Max moves
                <input id="maxMoveCount" type="number" min="1" max="1000" value="250" />
              </label>
            </div>
            <button class="primary-button" type="submit">Queue Match</button>
          </form>

          <section class="panel">
            <h2>Jobs</h2>
            <div class="list" id="jobsList"></div>
          </section>
        </div>
      </section>

      <section class="view hidden" id="historyView">
        <div class="panel">
          <div class="section-header">
            <h2>Game History</h2>
            <input class="filter-input" id="historyFilter" placeholder="Filter by player" />
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Black</th>
                  <th>White</th>
                  <th>Score</th>
                  <th>Result</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="gamesTable"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section class="view hidden" id="replayView">
        <div class="replay-layout">
          <div class="panel board-panel">
            <div class="go-board" id="goBoard"></div>
          </div>
          <aside class="panel replay-side">
            <h2>Replay</h2>
            <dl class="facts">
              <dt>Black</dt>
              <dd id="replayBlack">-</dd>
              <dt>White</dt>
              <dd id="replayWhite">-</dd>
              <dt>Score</dt>
              <dd id="replayScore">-</dd>
              <dt>Result</dt>
              <dd id="replayResult">-</dd>
            </dl>
            <div class="move-controls">
              <button class="icon-button" id="previousMove" type="button" title="Previous move">Back</button>
              <input id="moveSlider" type="range" min="0" max="0" value="0" />
              <button class="icon-button" id="nextMove" type="button" title="Next move">Next</button>
            </div>
            <p class="move-label" id="moveLabel">Select a game from history to inspect the moves.</p>
            <p class="error-text hidden" id="replayError"></p>
          </aside>
        </div>
      </section>

      <section class="view hidden" id="leagueView">
        <div class="panel">
          <h2>League Table</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr id="leagueHeader"></tr>
              </thead>
              <tbody id="leagueTable"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
